<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Exchange Pro - Sistema Financiero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <h1 class="logo">Global<span>Exchange</span></h1>
            <nav>
                <ul>
                    <li><button id="dark-mode-toggle" class="btn-small">🌓 Modo</button></li>
                    <li><a href="#tasas">Tasas</a></li>
                    <li><a href="#admin-section">Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="calculator-card">
            <h3>Calculadora de Divisas</h3>
            <div class="input-group">
                <label>Cantidad:</label>
                <input type="number" id="amount" placeholder="0.00" oninput="window.calcular()">
            </div>
            <div class="currency-group">
                <div class="input-group">
                    <label>Moneda:</label>
                    <select id="currency-select" onchange="window.calcular()">
                        <option value="usd_compra">Dólar - Compra</option>
                        <option value="usd_venta">Dólar - Venta</option>
                        <option value="eur_compra">Euro - Compra</option>
                        <option value="eur_venta">Euro - Venta</option>
                    </select>
                </div>
            </div>
            <div id="result" class="result-display">0.00 DOP</div>
            <button class="btn" onclick="window.generarPDF()" style="background:#444; color:white; margin-top:10px;">📄 Generar Comprobante</button>
        </section>

        <section id="tasas" class="rates">
            <h2>Tasas del Día</h2>
            <table class="rates-table">
                <thead>
                    <tr>
                        <th>Moneda</th>
                        <th>Compra</th>
                        <th>Venta</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>🇺🇸 Dólar (USD)</td>
                        <td id="usd-compra-val">...</td>
                        <td id="usd-venta-val">...</td>
                    </tr>
                    <tr>
                        <td>🇪🇺 Euro (EUR)</td>
                        <td id="eur-compra-val">...</td>
                        <td id="eur-venta-val">...</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section id="admin-section">
            <div id="login-section" class="calculator-card">
                <h3>Acceso Administrativo</h3>
                <input type="email" id="admin-email" placeholder="Correo">
                <input type="password" id="admin-pass" placeholder="Contraseña">
                <button class="btn" onclick="window.login()">Entrar</button>
            </div>

            <div id="admin-panel" class="calculator-card" style="display:none; border: 2px solid var(--secondary);">
                <h3>Panel de Control</h3>
                <div class="input-group">
                    <label>Dólar (USD):</label>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="new-usd-compra" placeholder="Compra">
                        <input type="number" id="new-usd-venta" placeholder="Venta">
                    </div>
                </div>
                <div class="input-group">
                    <label>Euro (EUR):</label>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="new-eur-compra" placeholder="Compra">
                        <input type="number" id="new-eur-venta" placeholder="Venta">
                    </div>
                </div>
                <button class="btn" onclick="window.updateRate()">Actualizar Todo</button>
                <button onclick="window.logout()" style="margin-top:15px; background:none; border:none; color:red; cursor:pointer;">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3V0dUOaCq7aS67-AY8IpX0QGzeoHgLWg",
            authDomain: "casacambio-admin.firebaseapp.com",
            projectId: "casacambio-admin",
            storageBucket: "casacambio-admin.firebasestorage.app",
            messagingSenderId: "491964316067",
            appId: "1:491964316067:web:46e4d63a1d80098afd4216"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rateRef = doc(db, "configuracion", "tasas");

        // --- LECTURA EN TIEMPO REAL ---
        onSnapshot(rateRef, (snapshot) => {
            if (snapshot.exists()) {
                const d = snapshot.data();
                document.getElementById('usd-compra-val').innerText = d.usd_compra;
                document.getElementById('usd-venta-val').innerText = d.usd_venta;
                document.getElementById('eur-compra-val').innerText = d.eur_compra;
                document.getElementById('eur-venta-val').innerText = d.eur_venta;
                window.rates = d;
                window.calcular();
            }
        });

        // --- CALCULADORA ---
        window.calcular = () => {
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('currency-select').value;
            const rate = window.rates ? window.rates[type] : 0;
            if(amount > 0) {
                document.getElementById('result').innerText = (amount * rate).toFixed(2) + " DOP";
            }
        };

        // --- MODO OSCURO ---
        const btnDark = document.getElementById('dark-mode-toggle');
        btnDark.onclick = () => document.body.classList.toggle('dark-theme');

        // --- LOGIN & ADMIN ---
        window.login = async () => {
            const e = document.getElementById('admin-email').value;
            const p = document.getElementById('admin-pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Error"); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            document.getElementById('admin-panel').style.display = user ? 'block' : 'none';
            document.getElementById('login-section').style.display = user ? 'none' : 'block';
        });

        window.updateRate = async () => {
            const data = {
                usd_compra: parseFloat(document.getElementById('new-usd-compra').value),
                usd_venta: parseFloat(document.getElementById('new-usd-venta').value),
                eur_compra: parseFloat(document.getElementById('new-eur-compra').value),
                eur_venta: parseFloat(document.getElementById('new-eur-venta').value)
            };
            await updateDoc(rateRef, data);
            alert("Tasas actualizadas");
        };

        // --- GENERAR PDF ---
        window.generarPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const amount = document.getElementById('amount').value;
            const result = document.getElementById('result').innerText;
            const type = document.getElementById('currency-select').options[document.getElementById('currency-select').selectedIndex].text;

            doc.setFontSize(20);
            doc.text("Global Exchange - Recibo", 20, 20);
            doc.setFontSize(12);
            doc.text(`Fecha: ${new Date().toLocaleString()}`, 20, 30);
            doc.text(`Transacción: ${type}`, 20, 40);
            doc.text(`Cantidad original: ${amount}`, 20, 50);
            doc.text(`Total a entregar: ${result}`, 20, 60);
            doc.save("recibo-cambio.pdf");
        };
    </script>

    <style>
        /* Estilos rápidos para el Modo Oscuro */
        .dark-theme { background: #1a1a1a !important; color: #fff !important; }
        .dark-theme .calculator-card, .dark-theme .rates-table { background: #333; color: #fff; }
        .dark-theme header { background: #000; }
        .btn-small { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; }
    </style>
</body>
</html>
