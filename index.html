<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Exchange Pro - Reporte Diario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <h1 class="logo">Global<span>Exchange</span></h1>
            <nav>
                <ul>
                    <li><button id="dark-mode-toggle" class="btn-small">🌓 Modo</button></li>
                    <li><a href="#tasas">Tasas</a></li>
                    <li><a href="#admin-section">Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="calculator-card">
            <h3>Calculadora de Divisas</h3>
            <div class="input-group">
                <label>Cantidad:</label>
                <input type="number" id="amount" placeholder="0.00" oninput="window.calcular()">
            </div>
            <div class="currency-group">
                <div class="input-group">
                    <label>Operación:</label>
                    <select id="currency-select" onchange="window.calcular()">
                        <option value="usd_compra">Dólar - Compra</option>
                        <option value="usd_venta">Dólar - Venta</option>
                        <option value="eur_compra">Euro - Compra</option>
                        <option value="eur_venta">Euro - Venta</option>
                    </select>
                </div>
            </div>
            <div id="result" class="result-display">0.00 DOP</div>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn" onclick="window.generarReporteDiario()" style="background:#444; color:white; flex:1;">📊 Reporte del Día (PDF)</button>
                <button class="btn" onclick="window.imprimirRecibo()" style="background:#05cd99; color:white; flex:1;">🖨️ Ticket Venta</button>
            </div>
        </section>

        <section id="tasas" class="rates">
            <h2>Tasas del Día</h2>
            <table class="rates-table">
                <thead>
                    <tr><th>Moneda</th><th>Compra</th><th>Venta</th></tr>
                </thead>
                <tbody>
                    <tr><td>🇺🇸 Dólar (USD)</td><td id="usd-compra-val">...</td><td id="usd-venta-val">...</td></tr>
                    <tr><td>🇪🇺 Euro (EUR)</td><td id="eur-compra-val">...</td><td id="eur-venta-val">...</td></tr>
                </tbody>
            </table>
        </section>

        <section class="container" style="margin-top:40px; margin-bottom: 40px;">
            <h3>Tendencia del Mercado (Dólar)</h3>
            <div style="background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <canvas id="graficoTasas" style="width:100%; max-height:300px;"></canvas>
            </div>
        </section>

        <section id="admin-section">
            <div id="login-section" class="calculator-card">
                <h3>Acceso Administrativo</h3>
                <input type="email" id="admin-email" placeholder="Correo">
                <input type="password" id="admin-pass" placeholder="Contraseña">
                <button class="btn" onclick="window.login()">Entrar</button>
            </div>

            <div id="admin-panel" class="calculator-card" style="display:none; border: 2px solid #00D4FF;">
                <h3>Panel de Control</h3>
                <div class="input-group">
                    <label>Dólar (USD):</label>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="new-usd-compra" placeholder="Compra">
                        <input type="number" id="new-usd-venta" placeholder="Venta">
                    </div>
                </div>
                <div class="input-group">
                    <label>Euro (EUR):</label>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="new-eur-compra" placeholder="Compra">
                        <input type="number" id="new-eur-venta" placeholder="Venta">
                    </div>
                </div>
                <button class="btn" onclick="window.updateRate()">Registrar Cambio y Guardar</button>
                <button onclick="window.logout()" style="margin-top:15px; background:none; border:none; color:red; cursor:pointer;">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3V0dUOaCq7aS67-AY8IpX0QGzeoHgLWg",
            authDomain: "casacambio-admin.firebaseapp.com",
            projectId: "casacambio-admin",
            storageBucket: "casacambio-admin.firebasestorage.app",
            messagingSenderId: "491964316067",
            appId: "1:491964316067:web:46e4d63a1d80098afd4216"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rateRef = doc(db, "configuracion", "tasas");

        let miGrafico;

        // GRÁFICO
        async function cargarHistorial() {
            const q = query(collection(db, "historial"), orderBy("fecha", "asc"));
            const snapshot = await getDocs(q);
            const fechas = [], valores = [];
            snapshot.forEach(doc => {
                fechas.push(new Date(doc.data().fecha).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
                valores.push(doc.data().usd_compra);
            });
            const ctx = document.getElementById('graficoTasas').getContext('2d');
            if(miGrafico) miGrafico.destroy();
            miGrafico = new Chart(ctx, {
                type:'line',
                data:{ labels:fechas, datasets:[{label:'USD Compra', data:valores, borderColor:'#00D4FF', fill:true, backgroundColor:'rgba(0,212,255,0.1)'}] },
                options: { responsive:true, maintainAspectRatio:false }
            });
        }

        // REPORTE DIARIO EN PDF
        window.generarReporteDiario = async () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Obtener inicio del día de hoy
            const hoy = new Date();
            hoy.setHours(0,0,0,0);
            const inicioDia = hoy.getTime();

            const q = query(collection(db, "historial"), where("fecha", ">=", inicioDia), orderBy("fecha", "desc"));
            const snapshot = await getDocs(q);
            
            doc.setFontSize(18);
            doc.text("REPORTE DIARIO DE OPERACIONES", 14, 20);
            doc.setFontSize(10);
            doc.text(`Fecha del reporte: ${new Date().toLocaleDateString()}`, 14, 30);

            const filas = [];
            snapshot.forEach(d => {
                const data = d.data();
                filas.push([
                    new Date(data.fecha).toLocaleTimeString(),
                    data.usd_compra.toFixed(2),
                    data.usd_venta.toFixed(2),
                    data.eur_compra.toFixed(2),
                    data.eur_venta.toFixed(2)
                ]);
            });

            doc.autoTable({
                startY: 40,
                head: [['Hora', 'USD Compra', 'USD Venta', 'EUR Compra', 'EUR Venta']],
                body: filas,
            });

            doc.save(`Reporte_Diario_${new Date().toLocaleDateString()}.pdf`);
        };

        // ... RESTO DE FUNCIONES (Login, Update, Calcular, Imprimir Ticket) ...
        onSnapshot(rateRef, (snapshot) => {
            if (snapshot.exists()) {
                const d = snapshot.data();
                document.getElementById('usd-compra-val').innerText = d.usd_compra;
                document.getElementById('usd-venta-val').innerText = d.usd_venta;
                document.getElementById('eur-compra-val').innerText = d.eur_compra;
                document.getElementById('eur-venta-val').innerText = d.eur_venta;
                window.rates = d;
            }
        });

        window.updateRate = async () => {
            const data = {
                usd_compra: parseFloat(document.getElementById('new-usd-compra').value),
                usd_venta: parseFloat(document.getElementById('new-usd-venta').value),
                eur_compra: parseFloat(document.getElementById('new-eur-compra').value),
                eur_venta: parseFloat(document.getElementById('new-eur-venta').value),
                fecha: Date.now()
            };
            await updateDoc(rateRef, data);
            await addDoc(collection(db, "historial"), data);
            alert("Operación registrada e historial actualizado");
            cargarHistorial();
        };

        window.calcular = () => {
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('currency-select').value;
            const rate = window.rates ? window.rates[type] : 0;
            document.getElementById('result').innerText = (amount > 0) ? (amount * rate).toFixed(2) + " DOP" : "0.00 DOP";
        };

        window.imprimirRecibo = () => {
            const win = window.open('', '_blank');
            win.document.write(`<div style="font-family:monospace; width:200px; text-align:center;"><h3>GLOBAL EXCHANGE</h3><p>${new Date().toLocaleString()}</p><p>${document.getElementById('currency-select').options[document.getElementById('currency-select').selectedIndex].text}</p><p>Total: ${document.getElementById('result').innerText}</p></div>`);
            win.document.close(); win.print(); win.close();
        };

        window.login = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('admin-email').value, document.getElementById('admin-pass').value); } catch(e) { alert("Error"); }
        };
        window.logout = () => signOut(auth);
        onAuthStateChanged(auth, user => {
            document.getElementById('admin-panel').style.display = user ? 'block' : 'none';
            document.getElementById('login-section').style.display = user ? 'none' : 'block';
        });

        const btnDark = document.getElementById('dark-mode-toggle');
        btnDark.onclick = () => document.body.classList.toggle('dark-theme');
        window.onload = cargarHistorial;
    </script>

    <style>
        .dark-theme { background: #121212 !important; color: #e0e0e0 !important; }
        .dark-theme .calculator-card, .dark-theme .rates-table, .dark-theme input, .dark-theme select { background: #1e1e1e !important; color: #fff !important; }
        .btn-small { padding: 5px 10px; cursor: pointer; border-radius: 5px; }
    </style>
</body>
</html>
