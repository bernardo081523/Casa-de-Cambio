<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Exchange Pro - Acceso Autorizado</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Pantalla de Bloqueo Profesional */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .lock-card {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 400px;
        }
        .hidden { display: none !important; }
        .logo span { color: #00D4FF; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="lock-card">
            <h1 class="logo">Global<span>Exchange</span></h1>
            <p style="margin-bottom: 20px; color: #555;">Sistema de Gestión de Divisas</p>
            <input type="email" id="user-email" placeholder="Usuario" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">
            <input type="password" id="user-pass" placeholder="Contraseña" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px;">
            <button class="btn" onclick="window.login()" style="width: 100%; background: #00D4FF; color: white;">Entrar</button>
            <p id="error-msg" style="color: red; margin-top: 15px; font-size: 0.9rem; display: none;">Acceso denegado.</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div class="container header-container">
                <h1 class="logo">Global<span>Exchange</span></h1>
                <div style="display:flex; align-items:center; gap:15px;">
                    <span id="empresa-info" style="font-size: 0.8rem; color: #444;"></span>
                    <span id="user-info" style="font-size: 0.8rem; color: #00D4FF; font-weight: bold;"></span>
                    <button onclick="window.logout()" style="background:none; border: 1px solid red; color: red; padding: 5px; cursor: pointer; border-radius: 5px;">Cerrar Sesión</button>
                </div>
            </div>
        </header>

        <main class="container">
            <section class="calculator-card">
                <h3>Nueva Operación</h3>
                <div class="input-group">
                    <label>Cantidad (Divisa):</label>
                    <input type="number" id="amount" placeholder="0.00" oninput="window.calcular()">
                </div>
                <div class="input-group">
                    <label>Tipo de Operación:</label>
                    <select id="currency-select" onchange="window.calcular()">
                        <option value="usd_compra">Dólar - Compra</option>
                        <option value="usd_venta">Dólar - Venta</option>
                        <option value="eur_compra">Euro - Compra</option>
                        <option value="eur_venta">Euro - Venta</option>
                    </select>
                </div>
                <div id="result" class="result-display">0.00 DOP</div>

                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                    <button class="btn" onclick="window.imprimirRecibo()" style="background:#05cd99; color:white;">🖨️ Generar Ticket</button>
                    <button id="admin-report-btn" class="btn" onclick="window.generarReporteDiario()" style="background:#444; color:white; display:none;">📊 Auditoría (PDF)</button>
                </div>
            </section>

            <section class="rates">
                <h2>Tasas en Tiempo Real</h2>
                <table class="rates-table">
                    <thead><tr><th>Moneda</th><th>Compra</th><th>Venta</th></tr></thead>
                    <tbody>
                        <tr><td>🇺🇸 Dólar</td><td id="usd-compra-val">...</td><td id="usd-venta-val">...</td></tr>
                        <tr><td>🇪🇺 Euro</td><td id="eur-compra-val">...</td><td id="eur-venta-val">...</td></tr>
                    </tbody>
                </table>
            </section>

            <section id="edit-rates-card" class="calculator-card" style="display:none;">
                <h3>Actualizar Tasas (Admin)</h3>
                <div class="input-group">
                    <label>Dólar - Compra:</label>
                    <input type="number" step="0.01" id="edit-usd-compra">
                </div>
                <div class="input-group">
                    <label>Dólar - Venta:</label>
                    <input type="number" step="0.01" id="edit-usd-venta">
                </div>
                <div class="input-group">
                    <label>Euro - Compra:</label>
                    <input type="number" step="0.01" id="edit-eur-compra">
                </div>
                <div class="input-group">
                    <label>Euro - Venta:</label>
                    <input type="number" step="0.01" id="edit-eur-venta">
                </div>
                <button class="btn" onclick="window.guardarTasas()" style="background:#0A2540; color:white;">💾 Guardar Tasas</button>
                <p id="tasas-msg" style="margin-top:10px; font-size:0.85rem; display:none;"></p>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3V0dUOaCq7aS67-AY8IpX0QGzeoHgLWg",
            authDomain: "casacambio-admin.firebaseapp.com",
            projectId: "casacambio-admin",
            storageBucket: "casacambio-admin.firebasestorage.app",
            messagingSenderId: "491964316067",
            appId: "1:491964316067:web:46e4d63a1d80098afd4216"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let empresaId = null; // se llena después del login
        let empresaNombre = "";

        // LOGIN Y SEGURIDAD
        window.login = async () => {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;
            document.getElementById('error-msg').style.display = 'none';
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch(e) {
                document.getElementById('error-msg').innerText = "Acceso denegado.";
                document.getElementById('error-msg').style.display = 'block';
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Buscar a qué empresa pertenece este usuario
                const usuarioSnap = await getDoc(doc(db, "usuarios", user.uid));

                if (!usuarioSnap.exists() || !usuarioSnap.data().empresaId) {
                    document.getElementById('error-msg').innerText = "Este usuario no tiene una empresa asignada. Contacta al administrador.";
                    document.getElementById('error-msg').style.display = 'block';
                    await signOut(auth);
                    return;
                }

                empresaId = usuarioSnap.data().empresaId;
                empresaNombre = usuarioSnap.data().nombreEmpresa || empresaId;

                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-info').innerText = user.email;
                document.getElementById('empresa-info').innerText = empresaNombre;

                // El botón de auditoría y la edición de tasas se muestran solo a rol admin
                if (usuarioSnap.data().rol === "admin") {
                    document.getElementById('admin-report-btn').style.display = 'block';
                    document.getElementById('edit-rates-card').style.display = 'block';
                }

                iniciarSistema();
            } else {
                empresaId = null;
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        function iniciarSistema() {
            onSnapshot(doc(db, "empresas", empresaId, "configuracion", "tasas"), (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    window.rates = d;
                    document.getElementById('usd-compra-val').innerText = d.usd_compra ?? '--';
                    document.getElementById('usd-venta-val').innerText = d.usd_venta ?? '--';
                    document.getElementById('eur-compra-val').innerText = d.eur_compra ?? '--';
                    document.getElementById('eur-venta-val').innerText = d.eur_venta ?? '--';

                    // Si el usuario es admin, mantiene los campos de edición actualizados
                    // (solo si no los está editando en este momento)
                    if (document.getElementById('edit-rates-card').style.display !== 'none' && document.activeElement.tagName !== 'INPUT') {
                        document.getElementById('edit-usd-compra').value = d.usd_compra ?? '';
                        document.getElementById('edit-usd-venta').value = d.usd_venta ?? '';
                        document.getElementById('edit-eur-compra').value = d.eur_compra ?? '';
                        document.getElementById('edit-eur-venta').value = d.eur_venta ?? '';
                    }
                }
            });
        }

        window.guardarTasas = async () => {
            if (!empresaId) return alert("Sesión no válida.");

            const nuevas = {
                usd_compra: parseFloat(document.getElementById('edit-usd-compra').value),
                usd_venta: parseFloat(document.getElementById('edit-usd-venta').value),
                eur_compra: parseFloat(document.getElementById('edit-eur-compra').value),
                eur_venta: parseFloat(document.getElementById('edit-eur-venta').value)
            };

            // Validación simple: que no queden campos vacíos o inválidos
            for (const key in nuevas) {
                if (isNaN(nuevas[key]) || nuevas[key] <= 0) {
                    return alert("Revisa los valores, todos deben ser números mayores a 0.");
                }
            }

            try {
                await setDoc(doc(db, "empresas", empresaId, "configuracion", "tasas"), nuevas, { merge: true });
                const msg = document.getElementById('tasas-msg');
                msg.innerText = "✅ Tasas actualizadas: " + new Date().toLocaleTimeString();
                msg.style.color = "#05cd99";
                msg.style.display = "block";
            } catch (e) {
                const msg = document.getElementById('tasas-msg');
                msg.innerText = "❌ Error al guardar. Intenta de nuevo.";
                msg.style.color = "red";
                msg.style.display = "block";
            }
        };

        window.calcular = () => {
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('currency-select').value;
            const rate = window.rates ? window.rates[type] : 0;
            document.getElementById('result').innerText = (amount > 0) ? (amount * rate).toFixed(2) + " DOP" : "0.00 DOP";
        };

        window.imprimirRecibo = async () => {
            if (!empresaId) return alert("Sesión no válida, vuelve a iniciar sesión.");
            const amount = document.getElementById('amount').value;
            const detalle = document.getElementById('currency-select').options[document.getElementById('currency-select').selectedIndex].text;
            const total = document.getElementById('result').innerText;

            if (!amount || amount <= 0) return alert("Ingrese un monto antes de imprimir el ticket.");

            // Primero se registra la operación en Firebase (auditoría obligatoria),
            // sin importar si el cliente se lleva el ticket impreso o no.
            const operacion = {
                usuario: auth.currentUser.email,
                tipo: document.getElementById('currency-select').value,
                detalle: detalle,
                monto: parseFloat(amount),
                total: total,
                fecha: Date.now()
            };
            await addDoc(collection(db, "empresas", empresaId, "ventas"), operacion);

            const ventana = window.open('', 'PRINT', 'height=600,width=400');
            ventana.document.write(`
                <html>
                <head><title>Ticket</title>
                <style>
                    body { font-family: monospace; padding: 20px; }
                    h2 { text-align: center; margin-bottom: 5px; }
                    p { margin: 4px 0; }
                    hr { border: none; border-top: 1px dashed #000; }
                </style>
                </head>
                <body>
                    <h2>${empresaNombre}</h2>
                    <p style="text-align:center;">Comprobante de Operación</p>
                    <hr>
                    <p><strong>Fecha:</strong> ${new Date().toLocaleString()}</p>
                    <p><strong>Cajero:</strong> ${auth.currentUser.email}</p>
                    <p><strong>Operación:</strong> ${detalle}</p>
                    <p><strong>Monto recibido:</strong> ${amount}</p>
                    <p><strong>Total entregado:</strong> ${total}</p>
                    <hr>
                    <p style="text-align:center;">¡Gracias por su preferencia!</p>
                </body>
                </html>
            `);
            ventana.document.close();
            ventana.focus();
            ventana.print();

            document.getElementById('amount').value = "";
            window.calcular();
        };

        window.generarReporteDiario = async () => {
            if (!empresaId) return alert("Sesión no válida.");
            const { jsPDF } = window.jspdf;
            const pdfDoc = new jsPDF();
            const hoy = new Date(); hoy.setHours(0,0,0,0);

            const q = query(
                collection(db, "empresas", empresaId, "ventas"),
                where("fecha", ">=", hoy.getTime()),
                orderBy("fecha", "desc")
            );
            const snap = await getDocs(q);
            const filas = [];
            snap.forEach(d => {
                const v = d.data();
                filas.push([new Date(v.fecha).toLocaleTimeString(), v.usuario, v.detalle, v.total]);
            });

            pdfDoc.text(`REPORTE DE AUDITORÍA - ${empresaNombre}`, 14, 15);
            pdfDoc.setFontSize(10);
            pdfDoc.text(`Fecha: ${new Date().toLocaleDateString()}`, 14, 22);

            pdfDoc.autoTable({
                startY: 28,
                head: [["Hora", "Usuario", "Operación", "Total"]],
                body: filas.length ? filas : [["--", "--", "Sin operaciones hoy", "--"]]
            });

            pdfDoc.save(`reporte-${empresaNombre}-${new Date().toISOString().slice(0,10)}.pdf`);
        };
    </script>
</body>
</html>
