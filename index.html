<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Exchange Pro - Sistema Financiero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <h1 class="logo">Global<span>Exchange</span></h1>
            <nav>
                <ul>
                    <li><button id="dark-mode-toggle" class="btn-small">🌓 Modo</button></li>
                    <li><a href="#tasas">Tasas</a></li>
                    <li><a href="#admin-section">Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="calculator-card">
            <h3>Calculadora de Divisas</h3>
            <div class="input-group">
                <label>Cantidad:</label>
                <input type="number" id="amount" placeholder="0.00" oninput="window.calcular()">
            </div>
            <div class="currency-group">
                <div class="input-group">
                    <label>Operación:</label>
                    <select id="currency-select" onchange="window.calcular()">
                        <option value="usd_compra">Dólar - Compra</option>
                        <option value="usd_venta">Dólar - Venta</option>
                        <option value="eur_compra">Euro - Compra</option>
                        <option value="eur_venta">Euro - Venta</option>
                    </select>
                </div>
            </div>
            <div id="result" class="result-display">0.00 DOP</div>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn" onclick="window.generarPDF()" style="background:#444; color:white; flex:1;">📄 PDF</button>
                <button class="btn" onclick="window.imprimirRecibo()" style="background:#05cd99; color:white; flex:1;">🖨️ Imprimir</button>
            </div>
        </section>

        <section id="tasas" class="rates">
            <h2>Tasas del Día</h2>
            <table class="rates-table">
                <thead>
                    <tr>
                        <th>Moneda</th>
                        <th>Compra</th>
                        <th>Venta</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>🇺🇸 Dólar (USD)</td>
                        <td id="usd-compra-val">...</td>
                        <td id="usd-venta-val">...</td>
                    </tr>
                    <tr>
                        <td>🇪🇺 Euro (EUR)</td>
                        <td id="eur-compra-val">...</td>
                        <td id="eur-venta-val">...</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="container" style="margin-top:40px; margin-bottom: 40px;">
            <h3>Tendencia del Mercado (Dólar)</h3>
            <div style="background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <canvas id="graficoTasas" style="width:100%; max-height:300px;"></canvas>
            </div>
        </section>

        <section id="admin-section">
            <div id="login-section" class="calculator-card">
                <h3>Acceso Administrativo</h3>
                <input type="email" id="admin-email" placeholder="Correo">
                <input type="password" id="admin-pass" placeholder="Contraseña">
                <button class="btn" onclick="window.login()">Entrar</button>
            </div>

            <div id="admin-panel" class="calculator-card" style="display:none; border: 2px solid #00D4FF;">
                <h3>Panel de Control</h3>
                <div class="input-group">
                    <label>Dólar (USD):</label>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="new-usd-compra" placeholder="Compra">
                        <input type="number" id="new-usd-venta" placeholder="Venta">
                    </div>
                </div>
                <div class="input-group">
                    <label>Euro (EUR):</label>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="new-eur-compra" placeholder="Compra">
                        <input type="number" id="new-eur-venta" placeholder="Venta">
                    </div>
                </div>
                <button class="btn" onclick="window.updateRate()">Actualizar Todo e Historial</button>
                <button onclick="window.logout()" style="margin-top:15px; background:none; border:none; color:red; cursor:pointer;">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Global Exchange | Sistema de Gestión Financiera</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3V0dUOaCq7aS67-AY8IpX0QGzeoHgLWg",
            authDomain: "casacambio-admin.firebaseapp.com",
            projectId: "casacambio-admin",
            storageBucket: "casacambio-admin.firebasestorage.app",
            messagingSenderId: "491964316067",
            appId: "1:491964316067:web:46e4d63a1d80098afd4216"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rateRef = doc(db, "configuracion", "tasas");

        let miGrafico;

        // CARGAR GRÁFICO
        async function cargarHistorial() {
            try {
                const q = query(collection(db, "historial"), orderBy("fecha", "asc"), limit(10));
                const querySnapshot = await getDocs(q);
                const fechas = [];
                const valores = [];
                
                querySnapshot.forEach((doc) => {
                    fechas.push(new Date(doc.data().fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
                    valores.push(doc.data().usd_compra);
                });

                const ctx = document.getElementById('graficoTasas').getContext('2d');
                if (miGrafico) miGrafico.destroy();
                miGrafico = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: fechas,
                        datasets: [{
                            label: 'USD Compra (DOP)',
                            data: valores,
                            borderColor: '#00D4FF',
                            backgroundColor: 'rgba(0, 212, 255, 0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            } catch (e) { console.log("Iniciando historial..."); }
        }

        // DATOS EN TIEMPO REAL
        onSnapshot(rateRef, (snapshot) => {
            if (snapshot.exists()) {
                const d = snapshot.data();
                document.getElementById('usd-compra-val').innerText = d.usd_compra;
                document.getElementById('usd-venta-val').innerText = d.usd_venta;
                document.getElementById('eur-compra-val').innerText = d.eur_compra;
                document.getElementById('eur-venta-val').innerText = d.eur_venta;
                window.rates = d;
                window.calcular();
            }
        });

        // CALCULADORA
        window.calcular = () => {
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('currency-select').value;
            const rate = window.rates ? window.rates[type] : 0;
            document.getElementById('result').innerText = (amount > 0) ? (amount * rate).toFixed(2) + " DOP" : "0.00 DOP";
        };

        // ADMINISTRACIÓN
        window.login = async () => {
            const e = document.getElementById('admin-email').value;
            const p = document.getElementById('admin-pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Error de acceso"); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            document.getElementById('admin-panel').style.display = user ? 'block' : 'none';
            document.getElementById('login-section').style.display = user ? 'none' : 'block';
        });

        window.updateRate = async () => {
            const data = {
                usd_compra: parseFloat(document.getElementById('new-usd-compra').value),
                usd_venta: parseFloat(document.getElementById('new-usd-venta').value),
                eur_compra: parseFloat(document.getElementById('new-eur-compra').value),
                eur_venta: parseFloat(document.getElementById('new-eur-venta').value)
            };
            try {
                await updateDoc(rateRef, data);
                await addDoc(collection(db, "historial"), { ...data, fecha: Date.now() });
                alert("Sistema Actualizado");
                cargarHistorial();
            } catch (e) { alert("Error al guardar"); }
        };

        // PDF e IMPRESIÓN
        window.generarPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("GLOBAL EXCHANGE - COMPROBANTE", 20, 20);
            doc.text(`Fecha: ${new Date().toLocaleString()}`, 20, 40);
            doc.text(`Operación: ${document.getElementById('currency-select').options[document.getElementById('currency-select').selectedIndex].text}`, 20, 50);
            doc.text(`Monto: ${document.getElementById('amount').value}`, 20, 60);
            doc.text(`Total: ${document.getElementById('result').innerText}`, 20, 70);
            doc.save("recibo.pdf");
        };

        window.imprimirRecibo = () => {
            const amount = document.getElementById('amount').value;
            const result = document.getElementById('result').innerText;
            const type = document.getElementById('currency-select').options[document.getElementById('currency-select').selectedIndex].text;
            const win = window.open('', '_blank');
            win.document.write(`
                <div style="font-family:monospace; width:250px; text-align:center;">
                    <h3>GLOBAL EXCHANGE</h3>
                    <p>${new Date().toLocaleString()}</p>
                    <p>-------------------</p>
                    <p>${type}</p>
                    <p>Monto: ${amount}</p>
                    <p style="font-size:1.2rem; font-weight:bold;">Total: ${result}</p>
                    <p>-------------------</p>
                    <p>¡Gracias!</p>
                </div>
            `);
            win.document.close();
            win.print();
            win.close();
        };

        const btnDark = document.getElementById('dark-mode-toggle');
        btnDark.onclick = () => document.body.classList.toggle('dark-theme');

        window.onload = cargarHistorial;
    </script>

    <style>
        .dark-theme { background: #121212 !important; color: #e0e0e0 !important; }
        .dark-theme .calculator-card, .dark-theme .rates-table, .dark-theme input, .dark-theme select { 
            background: #1e1e1e !important; color: #fff !important; border-color: #444; 
        }
        .dark-theme header { background: #000; }
        .btn-small { padding: 5px 10px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: white; }
    </style>
</body>
</html>
