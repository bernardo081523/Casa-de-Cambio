<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Exchange - Casa de Cambio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <h1 class="logo">Global<span>Exchange</span></h1>
            <nav>
                <ul>
                    <li><a href="#inicio">Inicio</a></li>
                    <li><a href="#tasas">Tasas</a></li>
                    <li><a href="#login-section">Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="inicio" class="hero">
            <div class="container">
                <h2>Cambio de Divisas en Tiempo Real</h2>
                <p>Seguridad y confianza en cada transacción.</p>
                
                <div class="calculator-card">
                    <h3>Calculadora</h3>
                    <div class="input-group">
                        <label>Cantidad:</label>
                        <input type="number" id="amount" placeholder="0.00" oninput="window.calcular()">
                    </div>
                    <div class="currency-group">
                        <div class="input-group">
                            <label>De:</label>
                            <select><option>USD - Dólar</option></select>
                        </div>
                        <div class="input-group">
                            <label>A:</label>
                            <select><option>DOP - Peso Dom.</option></select>
                        </div>
                    </div>
                    <div id="result" class="result-display">0.00 DOP</div>
                </div>
            </div>
        </section>

        <section id="tasas" class="rates">
            <div class="container">
                <h2>Tasas Oficiales</h2>
                <table class="rates-table">
                    <thead>
                        <tr>
                            <th>Moneda</th>
                            <th>Compra</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>🇺🇸 Dólar (USD)</td>
                            <td id="tasa-actual">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="login-section" class="container" style="margin-top: 40px; text-align: center;">
            <div class="calculator-card">
                <h3>Acceso Admin</h3>
                <div class="input-group">
                    <input type="email" id="admin-email" placeholder="Correo electrónico">
                </div>
                <div class="input-group">
                    <input type="password" id="admin-pass" placeholder="Contraseña">
                </div>
                <button class="btn" onclick="window.login()">Entrar al Sistema</button>
            </div>
        </section>

        <section id="admin-panel" class="container" style="display:none; margin-top: 40px; text-align: center;">
            <div class="calculator-card" style="border: 2px solid #00D4FF;">
                <h3>Panel de Control</h3>
                <div class="input-group">
                    <label>Nueva Tasa USD:</label>
                    <input type="number" id="new-rate" step="0.01" placeholder="Ej: 59.10">
                </div>
                <button class="btn" onclick="window.updateRate()">Actualizar Tasa en Nube</button>
                <button class="btn" onclick="window.logout()" style="margin-top:10px; background:#ff4b4b; color:white;">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Global Exchange | Sistema de Gestión Financiera</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3V0dUOaCq7aS67-AY8IpX0QGzeoHgLWg",
            authDomain: "casacambio-admin.firebaseapp.com",
            projectId: "casacambio-admin",
            storageBucket: "casacambio-admin.firebasestorage.app",
            messagingSenderId: "491964316067",
            appId: "1:491964316067:web:46e4d63a1d80098afd4216",
            measurementId: "G-DLWM2HG4XQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Referencia al documento en Firestore
        const rateRef = doc(db, "configuracion", "tasas");

        // Leer tasa en tiempo real
        onSnapshot(rateRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                document.getElementById('tasa-actual').innerText = data.usd_compra + " DOP";
                window.currentRate = data.usd_compra;
                window.calcular(); // Recalcular si cambia la tasa
            }
        });

        // Función Login
        window.login = async () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                alert("Bienvenido, Omar");
            } catch (e) {
                alert("Error: " + e.message);
            }
        };

        // Función Logout
        window.logout = () => signOut(auth);

        // Función Actualizar Tasa
        window.updateRate = async () => {
            const rate = document.getElementById('new-rate').value;
            if(!rate) return alert("Ingresa un valor");
            try {
                await updateDoc(rateRef, { usd_compra: parseFloat(rate) });
                alert("Tasa actualizada con éxito");
            } catch (e) {
                alert("Error de permisos o conexión");
            }
        };

        // Función Calculadora
        window.calcular = () => {
            const amount = document.getElementById('amount').value;
            const rate = window.currentRate || 0;
            if(amount > 0) {
                document.getElementById('result').innerText = (amount * rate).toFixed(2) + " DOP";
            } else {
                document.getElementById('result').innerText = "0.00 DOP";
            }
        };

        // Gestionar visibilidad de paneles
        onAuthStateChanged(auth, (user) => {
            document.getElementById('admin-panel').style.display = user ? 'block' : 'none';
            document.getElementById('login-section').style.display = user ? 'none' : 'block';
        });
    </script>
</body>
</html>
